<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Hostel Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <h2>Hostel<span>Pro</span></h2>
            </div>
            <nav class="nav-menu">
                <button class="nav-item active" data-table="hostel">Hostels</button>
                <button class="nav-item" data-table="room">Rooms</button>
                <button class="nav-item" data-table="student">Students</button>
                <button class="nav-item" data-table="room_allocation">Allocations</button>
                <button class="nav-item" data-table="visitor">Visitors</button>
                <button class="nav-item" data-table="entry_log">Entry Logs</button>
                <button class="nav-item" data-table="complaint">Complaints</button>
                <button class="nav-item" data-table="fine">Fines</button>
                <button class="nav-item" data-table="zip">Zips</button>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div>
                    <h1 id="page-title">Hostels</h1>
                    <p class="subtitle">Manage and track your operational data.</p>
                </div>
                <button id="add-new-btn" class="btn-primary">+ Add Record</button>
            </header>

            <div class="content-body">
                <div class="table-container">
                    <table id="data-table">
                        <thead>
                            <tr id="table-headers"></tr>
                        </thead>
                        <tbody id="table-body">
                            <!-- Dynamic Content -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for Create/Update -->
    <div id="form-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2 id="modal-title">Add Record</h2>
            <form id="dynamic-form">
                <div id="form-fields"></div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary close-btn-bottom">Cancel</button>
                    <button type="submit" class="btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
